version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: skintech_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: skintech
      POSTGRES_USER: skintech_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_db_password_here}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - skintech_net

  api:
    build: 
      context: ./backend_django
      dockerfile: Dockerfile
    container_name: skintech_api
    restart: unless-stopped
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change_this_in_production}
      - DATABASE_URL=postgres://skintech_user:${DB_PASSWORD:-secure_db_password_here}@db:5432/skintech
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,api,web,skintech_web
    depends_on:
      - db
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    networks:
      - skintech_net

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skintech_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - skintech_net

volumes:
  pgdata:
  media_data:
  static_data:

networks:
  skintech_net:
    driver: bridge
