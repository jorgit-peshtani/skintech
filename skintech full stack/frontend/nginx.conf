server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files and handle React Router (fallback to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Django backend container
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle Django admin routes
    location /admin/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Serve media files from the backend container
    location /media/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # Serve static files from the backend container
    location /static/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }
}
